# Rational AI project template
# Copy this to your project and run: rai init "My Project" -d "description"
name: "My Project"
description: "A brief project description for AI analysis"
version: "0.1.0"

# AI Configuration
ai:
  provider: openai # openai | anthropic | local
  model: gpt-4o # model identifier
  # api_key: set RAI_API_KEY env var instead
  temperature: 0.7
  max_tokens: 4096

# Stakeholder context (optional — fed to requirements phase)
stakeholder_notes: |
  Add interview notes, business context, constraints here.
  The AI will use this to generate more accurate requirements.
