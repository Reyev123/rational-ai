deployment:
  ai_suggestions: Use blue-green deployment for zero-downtime releases.
  environments:
  - config:
      auto_scaling: false
      replicas: 1
    name: Development
    type: development
    url: https://dev.shopai.example.com
  - config:
      auto_scaling: true
      replicas: 2
    name: Staging
    type: staging
    url: https://staging.shopai.example.com
  - config:
      auto_scaling: true
      max_replicas: 20
      min_replicas: 3
      replicas: 3
    name: Production
    type: production
    url: https://shopai.example.com
  infrastructure_as_code: Terraform + Kubernetes (EKS)
  monitoring:
    alerting: PagerDuty
    apm: Datadog
    logging: ELK Stack
    uptime: Pingdom
  pipeline_steps:
  - command: ruff check . && mypy .
    description: quality
    name: Lint & Type Check
    order: 1
  - command: pytest tests/ --cov=src --cov-report=html
    description: test
    name: Unit Tests
    order: 2
  - command: docker compose build
    description: build
    name: Build Docker Images
    order: 3
  - command: pytest tests/integration/ -v
    description: test
    name: Integration Tests
    order: 4
  - command: kubectl apply -k k8s/staging/
    description: deploy
    name: Deploy to Staging
    order: 5
  - command: pytest tests/smoke/ --base-url=$STAGING_URL
    description: test
    name: Smoke Tests
    order: 6
  - command: kubectl apply -k k8s/production/
    description: deploy
    name: Deploy to Production
    order: 7
  status: completed
