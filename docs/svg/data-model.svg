<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="system-ui, -apple-system, sans-serif" font-size="11">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="920" height="760" fill="#FAFCFF" rx="12"/>
  <text x="460" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1B3A4B">Unified Project Data Model</text>

  <!-- Project (root) -->
  <rect x="310" y="50" width="300" height="110" rx="10" fill="#E8F4FD" stroke="#7FB3D3" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="72" text-anchor="middle" font-weight="700" font-size="14" fill="#1B3A4B">Project</text>
  <line x1="320" y1="80" x2="600" y2="80" stroke="#7FB3D3" stroke-width="0.5"/>
  <text x="330" y="96" font-size="10" fill="#555">+ name: str</text>
  <text x="330" y="109" font-size="10" fill="#555">+ description: str</text>
  <text x="330" y="122" font-size="10" fill="#555">+ version: str</text>
  <text x="330" y="135" font-size="10" fill="#555">+ created_at / updated_at: datetime</text>
  <text x="500" y="96" font-size="10" fill="#555">+ requirements: RequirementsPackage</text>
  <text x="500" y="109" font-size="10" fill="#555">+ roles: RolesPackage</text>
  <text x="500" y="122" font-size="10" fill="#555">+ architecture: ArchitecturePackage</text>
  <text x="500" y="135" font-size="10" fill="#555">+ development / deployment / schedule</text>

  <!-- RequirementsPackage -->
  <rect x="20" y="210" width="250" height="100" rx="8" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="230" text-anchor="middle" font-weight="700" fill="#1B3A4B">RequirementsPackage</text>
  <line x1="30" y1="237" x2="260" y2="237" stroke="#7FB3D3" stroke-width="0.5"/>
  <text x="35" y="252" font-size="10" fill="#555">+ requirements: List[Requirement]</text>
  <text x="35" y="265" font-size="10" fill="#555">+ use_cases: List[UseCase]</text>
  <text x="35" y="278" font-size="10" fill="#555">+ stakeholder_notes: str</text>
  <text x="35" y="291" font-size="10" fill="#555">+ ai_summary: str</text>
  <line x1="350" y1="160" x2="145" y2="210" stroke="#7FB3D3" stroke-width="1.5"/>

  <!-- Requirement -->
  <rect x="20" y="340" width="250" height="110" rx="8" fill="#F0F8FF" stroke="#7FB3D3" stroke-width="1" filter="url(#shadow)"/>
  <text x="145" y="358" text-anchor="middle" font-weight="700" fill="#1B3A4B">Requirement</text>
  <line x1="30" y1="365" x2="260" y2="365" stroke="#7FB3D3" stroke-width="0.5"/>
  <text x="35" y="380" font-size="10" fill="#555">+ id: str (REQ-001)</text>
  <text x="35" y="393" font-size="10" fill="#555">+ title / description: str</text>
  <text x="35" y="406" font-size="10" fill="#555">+ type: RequirementType</text>
  <text x="35" y="419" font-size="10" fill="#555">+ priority: Priority</text>
  <text x="35" y="432" font-size="10" fill="#555">+ acceptance_criteria: List[str]</text>
  <line x1="145" y1="310" x2="145" y2="340" stroke="#7FB3D3" stroke-width="1"/>
  <text x="153" y="328" font-size="9" fill="#7FB3D3">◆ 1..*</text>

  <!-- UseCase -->
  <rect x="20" y="480" width="250" height="95" rx="8" fill="#F0F8FF" stroke="#7FB3D3" stroke-width="1" filter="url(#shadow)"/>
  <text x="145" y="498" text-anchor="middle" font-weight="700" fill="#1B3A4B">UseCase</text>
  <line x1="30" y1="505" x2="260" y2="505" stroke="#7FB3D3" stroke-width="0.5"/>
  <text x="35" y="520" font-size="10" fill="#555">+ id: str (UC-001)</text>
  <text x="35" y="533" font-size="10" fill="#555">+ title / actor: str</text>
  <text x="35" y="546" font-size="10" fill="#555">+ main_flow: List[str]</text>
  <text x="35" y="559" font-size="10" fill="#555">+ related_requirements: List[str]</text>
  <line x1="60" y1="450" x2="60" y2="480" stroke="#7FB3D3" stroke-width="1"/>
  <text x="68" y="468" font-size="9" fill="#7FB3D3">◆ 0..*</text>

  <!-- RolesPackage -->
  <rect x="335" y="210" width="250" height="85" rx="8" fill="#FFF8E7" stroke="#E6C97A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="230" text-anchor="middle" font-weight="700" fill="#1B3A4B">RolesPackage</text>
  <line x1="345" y1="237" x2="575" y2="237" stroke="#E6C97A" stroke-width="0.5"/>
  <text x="350" y="252" font-size="10" fill="#555">+ members: List[TeamMember]</text>
  <text x="350" y="265" font-size="10" fill="#555">+ raci_matrix: Dict</text>
  <text x="350" y="278" font-size="10" fill="#555">+ ai_recommendations: str</text>
  <line x1="460" y1="160" x2="460" y2="210" stroke="#E6C97A" stroke-width="1.5"/>

  <!-- TeamMember -->
  <rect x="335" y="325" width="250" height="95" rx="8" fill="#FFFDF0" stroke="#E6C97A" stroke-width="1" filter="url(#shadow)"/>
  <text x="460" y="343" text-anchor="middle" font-weight="700" fill="#1B3A4B">TeamMember</text>
  <line x1="345" y1="350" x2="575" y2="350" stroke="#E6C97A" stroke-width="0.5"/>
  <text x="350" y="365" font-size="10" fill="#555">+ id / name: str</text>
  <text x="350" y="378" font-size="10" fill="#555">+ role: RoleType</text>
  <text x="350" y="391" font-size="10" fill="#555">+ skills: List[str]</text>
  <text x="350" y="404" font-size="10" fill="#555">+ availability: float</text>
  <line x1="460" y1="295" x2="460" y2="325" stroke="#E6C97A" stroke-width="1"/>
  <text x="468" y="313" font-size="9" fill="#E6C97A">◆ 1..*</text>

  <!-- ArchitecturePackage -->
  <rect x="650" y="210" width="250" height="100" rx="8" fill="#E8FFE8" stroke="#90C695" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="230" text-anchor="middle" font-weight="700" fill="#1B3A4B">ArchitecturePackage</text>
  <line x1="660" y1="237" x2="890" y2="237" stroke="#90C695" stroke-width="0.5"/>
  <text x="665" y="252" font-size="10" fill="#555">+ components: List[ArchComponent]</text>
  <text x="665" y="265" font-size="10" fill="#555">+ diagrams: List[ArchDiagram]</text>
  <text x="665" y="278" font-size="10" fill="#555">+ decisions: List[ArchDecision]</text>
  <text x="665" y="291" font-size="10" fill="#555">+ tech_stack: Dict[str, str]</text>
  <line x1="570" y1="160" x2="775" y2="210" stroke="#90C695" stroke-width="1.5"/>

  <!-- ArchComponent -->
  <rect x="650" y="340" width="250" height="95" rx="8" fill="#F0FFF0" stroke="#90C695" stroke-width="1" filter="url(#shadow)"/>
  <text x="775" y="358" text-anchor="middle" font-weight="700" fill="#1B3A4B">ArchComponent</text>
  <line x1="660" y1="365" x2="890" y2="365" stroke="#90C695" stroke-width="0.5"/>
  <text x="665" y="380" font-size="10" fill="#555">+ id / name: str</text>
  <text x="665" y="393" font-size="10" fill="#555">+ type: str (service/db/queue)</text>
  <text x="665" y="406" font-size="10" fill="#555">+ technology: str</text>
  <text x="665" y="419" font-size="10" fill="#555">+ dependencies: List[str]</text>
  <line x1="775" y1="310" x2="775" y2="340" stroke="#90C695" stroke-width="1"/>
  <text x="783" y="328" font-size="9" fill="#90C695">◆ 1..*</text>

  <!-- DevelopmentPackage -->
  <rect x="335" y="470" width="250" height="85" rx="8" fill="#FFF0F5" stroke="#D4A0B0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="490" text-anchor="middle" font-weight="700" fill="#1B3A4B">DevelopmentPackage</text>
  <line x1="345" y1="497" x2="575" y2="497" stroke="#D4A0B0" stroke-width="0.5"/>
  <text x="350" y="512" font-size="10" fill="#555">+ tasks: List[DevTask]</text>
  <text x="350" y="525" font-size="10" fill="#555">+ coding_standards: str</text>
  <text x="350" y="538" font-size="10" fill="#555">+ branching_strategy: str</text>

  <!-- DevTask -->
  <rect x="335" y="585" width="250" height="95" rx="8" fill="#FFF8F8" stroke="#D4A0B0" stroke-width="1" filter="url(#shadow)"/>
  <text x="460" y="603" text-anchor="middle" font-weight="700" fill="#1B3A4B">DevTask</text>
  <line x1="345" y1="610" x2="575" y2="610" stroke="#D4A0B0" stroke-width="0.5"/>
  <text x="350" y="625" font-size="10" fill="#555">+ id / title: str</text>
  <text x="350" y="638" font-size="10" fill="#555">+ component / assigned_to: str</text>
  <text x="350" y="651" font-size="10" fill="#555">+ priority: Priority</text>
  <text x="350" y="664" font-size="10" fill="#555">+ estimated_hours: float</text>
  <line x1="460" y1="555" x2="460" y2="585" stroke="#D4A0B0" stroke-width="1"/>
  <text x="468" y="573" font-size="9" fill="#D4A0B0">◆ 1..*</text>

  <!-- DeploymentPackage -->
  <rect x="650" y="470" width="250" height="85" rx="8" fill="#F5F0FF" stroke="#B0A0D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="490" text-anchor="middle" font-weight="700" fill="#1B3A4B">DeploymentPackage</text>
  <line x1="660" y1="497" x2="890" y2="497" stroke="#B0A0D4" stroke-width="0.5"/>
  <text x="665" y="512" font-size="10" fill="#555">+ environments: List[Environment]</text>
  <text x="665" y="525" font-size="10" fill="#555">+ pipeline_steps: List[DeploymentStep]</text>
  <text x="665" y="538" font-size="10" fill="#555">+ monitoring: Dict</text>

  <!-- SchedulePackage -->
  <rect x="650" y="585" width="250" height="85" rx="8" fill="#FFFAF0" stroke="#D4B896" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="605" text-anchor="middle" font-weight="700" fill="#1B3A4B">SchedulePackage</text>
  <line x1="660" y1="612" x2="890" y2="612" stroke="#D4B896" stroke-width="0.5"/>
  <text x="665" y="627" font-size="10" fill="#555">+ milestones: List[Milestone]</text>
  <text x="665" y="640" font-size="10" fill="#555">+ sprints: List[Sprint]</text>
  <text x="665" y="653" font-size="10" fill="#555">+ estimated_duration_weeks: int</text>

  <text x="460" y="745" text-anchor="middle" font-size="10" fill="#999">Rational AI v0.1.0 — Data Model</text>
</svg>
