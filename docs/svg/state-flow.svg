<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7FB3D3"/>
    </marker>
  </defs>

  <rect width="600" height="380" fill="#FAFCFF" rx="12"/>
  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1B3A4B">Phase State Flow</text>

  <!-- Not Started -->
  <circle cx="100" cy="120" r="45" fill="#F0F0F0" stroke="#CCC" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="115" text-anchor="middle" font-weight="700" font-size="11" fill="#666">NOT</text>
  <text x="100" y="130" text-anchor="middle" font-weight="700" font-size="11" fill="#666">STARTED</text>

  <!-- In Progress -->
  <circle cx="300" cy="120" r="45" fill="#FFF8E7" stroke="#E6C97A" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="115" text-anchor="middle" font-weight="700" font-size="11" fill="#8B7A3A">IN</text>
  <text x="300" y="130" text-anchor="middle" font-weight="700" font-size="11" fill="#8B7A3A">PROGRESS</text>

  <!-- Review -->
  <circle cx="300" cy="280" r="45" fill="#E8F4FD" stroke="#7FB3D3" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="283" text-anchor="middle" font-weight="700" font-size="11" fill="#5A8BA8">REVIEW</text>

  <!-- Completed -->
  <circle cx="500" cy="200" r="45" fill="#E8FFE8" stroke="#90C695" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="203" text-anchor="middle" font-weight="700" font-size="11" fill="#4A7A4E">COMPLETED</text>

  <!-- Initial state -->
  <circle cx="30" cy="120" r="8" fill="#333"/>
  <line x1="38" y1="120" x2="55" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Transitions -->
  <!-- Not Started -> In Progress -->
  <line x1="145" y1="120" x2="255" y2="120" stroke="#E6C97A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="112" text-anchor="middle" font-size="9" fill="#8B7A3A">AI agent</text>
  <text x="200" y="123" text-anchor="middle" font-size="9" fill="#8B7A3A">invoked</text>

  <!-- In Progress -> Review -->
  <line x1="300" y1="165" x2="300" y2="235" stroke="#7FB3D3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="195" font-size="9" fill="#5A8BA8">Artifacts</text>
  <text x="320" y="206" font-size="9" fill="#5A8BA8">generated</text>

  <!-- Review -> Completed -->
  <line x1="340" y1="265" x2="460" y2="215" stroke="#90C695" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="248" text-anchor="middle" font-size="9" fill="#4A7A4E">User</text>
  <text x="410" y="259" text-anchor="middle" font-size="9" fill="#4A7A4E">approves</text>

  <!-- Review -> In Progress (re-run) -->
  <path d="M 260 268 Q 220 250 260 135" fill="none" stroke="#E6C97A" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="225" y="210" text-anchor="middle" font-size="9" fill="#8B7A3A">Re-run</text>

  <!-- Completed -> In Progress (re-run) -->
  <path d="M 470 175 Q 420 100 345 113" fill="none" stroke="#E6C97A" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="420" y="130" text-anchor="middle" font-size="9" fill="#8B7A3A">Re-run</text>

  <text x="300" y="370" text-anchor="middle" font-size="10" fill="#999">Rational AI v0.1.0 — Phase State Flow</text>
</svg>
