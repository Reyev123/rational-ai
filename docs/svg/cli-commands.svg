<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7FB3D3"/>
    </marker>
  </defs>

  <rect width="760" height="380" fill="#FAFCFF" rx="12"/>
  <text x="380" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1B3A4B">CLI Command Map</text>

  <!-- Center: rai -->
  <rect x="310" y="50" width="140" height="40" rx="10" fill="#E8F4FD" stroke="#7FB3D3" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="75" text-anchor="middle" font-weight="700" font-size="16" fill="#1B3A4B">rai</text>

  <!-- Setup commands -->
  <rect x="30" y="120" width="100" height="32" rx="6" fill="#FFF8E7" stroke="#E6C97A" stroke-width="1"/>
  <text x="80" y="140" text-anchor="middle" font-weight="600" fill="#1B3A4B">init</text>
  <line x1="330" y1="80" x2="130" y2="130" stroke="#E6C97A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Full lifecycle -->
  <rect x="160" y="120" width="100" height="32" rx="6" fill="#E8FFE8" stroke="#90C695" stroke-width="2"/>
  <text x="210" y="140" text-anchor="middle" font-weight="700" fill="#4A7A4E">full</text>
  <line x1="340" y1="85" x2="260" y2="126" stroke="#90C695" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase commands -->
  <rect x="30" y="185" width="100" height="28" rx="5" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1"/>
  <text x="80" y="204" text-anchor="middle" font-size="11" fill="#1B3A4B">requirements</text>

  <rect x="145" y="185" width="80" height="28" rx="5" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1"/>
  <text x="185" y="204" text-anchor="middle" font-size="11" fill="#1B3A4B">team</text>

  <rect x="240" y="185" width="100" height="28" rx="5" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1"/>
  <text x="290" y="204" text-anchor="middle" font-size="11" fill="#1B3A4B">architecture</text>

  <rect x="355" y="185" width="80" height="28" rx="5" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1"/>
  <text x="395" y="204" text-anchor="middle" font-size="11" fill="#1B3A4B">review</text>

  <rect x="450" y="185" width="100" height="28" rx="5" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1"/>
  <text x="500" y="204" text-anchor="middle" font-size="11" fill="#1B3A4B">development</text>

  <rect x="565" y="185" width="90" height="28" rx="5" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1"/>
  <text x="610" y="204" text-anchor="middle" font-size="11" fill="#1B3A4B">deployment</text>

  <rect x="670" y="185" width="75" height="28" rx="5" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1"/>
  <text x="707" y="204" text-anchor="middle" font-size="11" fill="#1B3A4B">schedule</text>

  <line x1="380" y1="90" x2="380" y2="168" stroke="#7FB3D3" stroke-width="1"/>
  <line x1="80" y1="168" x2="707" y2="168" stroke="#7FB3D3" stroke-width="1"/>
  <line x1="80" y1="168" x2="80" y2="185" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="185" y1="168" x2="185" y2="185" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="290" y1="168" x2="290" y2="185" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="395" y1="168" x2="395" y2="185" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="500" y1="168" x2="500" y2="185" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="610" y1="168" x2="610" y2="185" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="707" y1="168" x2="707" y2="185" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Utility commands -->
  <rect x="310" y="265" width="100" height="28" rx="5" fill="#F5F0FF" stroke="#B0A0D4" stroke-width="1"/>
  <text x="360" y="284" text-anchor="middle" font-size="11" fill="#1B3A4B">scaffold</text>
  <line x1="415" y1="88" x2="415" y2="248" stroke="#B0A0D4" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="415" y1="248" x2="360" y2="248" stroke="#B0A0D4" stroke-width="0.5"/>
  <line x1="360" y1="248" x2="360" y2="265" stroke="#B0A0D4" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="440" y="265" width="100" height="28" rx="5" fill="#F0FFFF" stroke="#96C8D4" stroke-width="1"/>
  <text x="490" y="284" text-anchor="middle" font-size="11" fill="#1B3A4B">export</text>
  <line x1="490" y1="248" x2="490" y2="265" stroke="#96C8D4" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="170" y="265" width="100" height="28" rx="5" fill="#FFFAF0" stroke="#D4B896" stroke-width="1"/>
  <text x="220" y="284" text-anchor="middle" font-size="11" fill="#1B3A4B">status</text>
  <line x1="220" y1="248" x2="220" y2="265" stroke="#D4B896" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="40" y="265" width="100" height="28" rx="5" fill="#FFFAF0" stroke="#D4B896" stroke-width="1"/>
  <text x="90" y="284" text-anchor="middle" font-size="11" fill="#1B3A4B">show</text>
  <line x1="90" y1="248" x2="90" y2="265" stroke="#D4B896" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Export sub-options -->
  <text x="490" y="310" text-anchor="middle" font-size="9" fill="#96C8D4">markdown | html | diagrams | all</text>

  <text x="380" y="365" text-anchor="middle" font-size="10" fill="#999">Rational AI v0.1.0 — CLI Commands</text>
</svg>
