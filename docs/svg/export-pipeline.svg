<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7FB3D3"/>
    </marker>
  </defs>

  <rect width="680" height="340" fill="#FAFCFF" rx="12"/>
  <text x="340" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1B3A4B">Export Pipeline</text>

  <!-- Project Model (source) -->
  <rect x="20" y="110" width="140" height="100" rx="10" fill="#FFF8E7" stroke="#E6C97A" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="140" text-anchor="middle" font-weight="700" fill="#1B3A4B">Project</text>
  <text x="90" y="155" text-anchor="middle" font-weight="700" fill="#1B3A4B">Model</text>
  <text x="90" y="175" text-anchor="middle" font-size="10" fill="#E6C97A">Pydantic</text>
  <text x="90" y="195" text-anchor="middle" font-size="10" fill="#E6C97A">6 packages</text>

  <!-- Markdown exporter -->
  <rect x="240" y="55" width="150" height="50" rx="8" fill="#DCEEFB" stroke="#7FB3D3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="315" y="78" text-anchor="middle" font-weight="600" fill="#1B3A4B">Markdown Exporter</text>
  <text x="315" y="93" text-anchor="middle" font-size="9" fill="#7FB3D3">markdown.py</text>
  <line x1="160" y1="135" x2="240" y2="85" stroke="#7FB3D3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HTML exporter -->
  <rect x="240" y="135" width="150" height="50" rx="8" fill="#E8FFE8" stroke="#90C695" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="315" y="158" text-anchor="middle" font-weight="600" fill="#1B3A4B">HTML Exporter</text>
  <text x="315" y="173" text-anchor="middle" font-size="9" fill="#90C695">html.py · Jinja2</text>
  <line x1="160" y1="160" x2="240" y2="160" stroke="#90C695" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mermaid exporter -->
  <rect x="240" y="215" width="150" height="50" rx="8" fill="#F5F0FF" stroke="#B0A0D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="315" y="238" text-anchor="middle" font-weight="600" fill="#1B3A4B">Mermaid Exporter</text>
  <text x="315" y="253" text-anchor="middle" font-size="9" fill="#B0A0D4">mermaid.py</text>
  <line x1="160" y1="185" x2="240" y2="235" stroke="#B0A0D4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Outputs -->
  <rect x="480" y="45" width="175" height="55" rx="8" fill="#F0FFF0" stroke="#90C695" stroke-width="1" filter="url(#shadow)"/>
  <text x="568" y="65" text-anchor="middle" font-size="15">📄</text>
  <text x="568" y="82" text-anchor="middle" font-weight="600" font-size="11" fill="#1B3A4B">report.md</text>
  <text x="568" y="94" text-anchor="middle" font-size="9" fill="#999">Tables · ADRs · Mermaid</text>
  <line x1="390" y1="80" x2="480" y2="75" stroke="#7FB3D3" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="480" y="120" width="175" height="55" rx="8" fill="#F0FFF0" stroke="#90C695" stroke-width="1" filter="url(#shadow)"/>
  <text x="568" y="140" text-anchor="middle" font-size="15">🌐</text>
  <text x="568" y="157" text-anchor="middle" font-weight="600" font-size="11" fill="#1B3A4B">report.html</text>
  <text x="568" y="169" text-anchor="middle" font-size="9" fill="#999">Interactive · Styled · Mermaid.js</text>
  <line x1="390" y1="160" x2="480" y2="150" stroke="#90C695" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="480" y="195" width="175" height="45" rx="8" fill="#F0FFF0" stroke="#90C695" stroke-width="1" filter="url(#shadow)"/>
  <text x="568" y="215" text-anchor="middle" font-size="15">📐</text>
  <text x="568" y="232" text-anchor="middle" font-weight="600" font-size="11" fill="#1B3A4B">*.mmd files</text>
  <line x1="390" y1="235" x2="480" y2="220" stroke="#B0A0D4" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="480" y="255" width="175" height="45" rx="8" fill="#F0FFF0" stroke="#90C695" stroke-width="1" filter="url(#shadow)"/>
  <text x="568" y="275" text-anchor="middle" font-size="15">📐</text>
  <text x="568" y="292" text-anchor="middle" font-weight="600" font-size="11" fill="#1B3A4B">diagrams.html</text>
  <line x1="390" y1="250" x2="480" y2="270" stroke="#B0A0D4" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="340" y="330" text-anchor="middle" font-size="10" fill="#999">Rational AI v0.1.0 — Export Pipeline</text>
</svg>
